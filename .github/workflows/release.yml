name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  ci:
    name: CI
    # The called workflow's package job needs id-token/attestations to
    # create the provenance attestation.
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/ci.yml
    with:
      attest-package: "true"

  release:
    name: Create Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # This permission is required for trusted publishing.
      id-token: write
    steps:
      - name: Set build variables
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" | tee -a $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.x"

      - name: Get packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: Packages
          path: dist

      - name: Create release
        # gh is provided by the runner, so a third-party release action isn't
        # needed; gh fails the step if any artifact upload fails.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${VERSION}" \
            --draft \
            --verify-tag \
            dist/*

      - name: Publish release to Test PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
